<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书脊 · 图书交易平台</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1 class="brand-name">书脊</h1>
        <p class="brand-tag">TinyWebServer 图书买卖平台</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="gateway-status" class="status-pill" data-state="loading">连接中</span>
      <span id="user-badge" class="user-badge hidden"></span>
    </div>
  </header>

  <main class="layout">
    <section class="catalog" aria-labelledby="catalog-heading">
      <div class="section-head">
        <h2 id="catalog-heading">书目</h2>
        <p class="section-desc">浏览在售图书，加入购物袋后结算下单。</p>
        <form id="search-form" class="search-bar" role="search">
          <label class="search-label" for="search-input">搜索图书</label>
          <input id="search-input" class="search-input" type="search" name="q"
                 placeholder="按书名或作者搜索" autocomplete="off" enterkeyhint="search">
          <button type="button" class="btn btn-ghost search-clear hidden" id="search-clear">清除</button>
        </form>
        <p id="search-status" class="search-status hidden" aria-live="polite"></p>
      </div>
      <div id="book-grid" class="book-grid" role="list"></div>
      <p id="catalog-empty" class="empty-state hidden">暂无在售图书</p>
      <p id="catalog-error" class="error-state hidden"></p>
    </section>

    <aside class="panel" aria-label="账户与购物">
      <nav class="panel-tabs" role="tablist">
        <button type="button" class="tab active" role="tab" aria-selected="true" data-tab="auth">账户</button>
        <button type="button" class="tab" role="tab" aria-selected="false" data-tab="cart">购物袋 <span id="cart-count" class="tab-count">0</span></button>
        <button type="button" class="tab" role="tab" aria-selected="false" data-tab="orders">订单</button>
      </nav>

      <div id="tab-auth" class="tab-panel active" role="tabpanel">
        <div class="auth-toggle">
          <button type="button" class="auth-mode active" data-mode="login">登录</button>
          <button type="button" class="auth-mode" data-mode="register">注册</button>
        </div>
        <form id="auth-form" class="auth-form" autocomplete="on">
          <label>
            <span>用户名</span>
            <input type="text" name="username" required minlength="2" maxlength="32" autocomplete="username">
          </label>
          <label>
            <span>密码</span>
            <input type="password" name="password" required minlength="4" maxlength="64" autocomplete="current-password">
          </label>
          <button type="submit" class="btn btn-primary" id="auth-submit">登录</button>
          <p id="auth-error" class="form-error hidden"></p>
        </form>
        <button type="button" class="btn btn-ghost hidden" id="logout-btn">退出登录</button>
      </div>

      <div id="tab-cart" class="tab-panel" role="tabpanel" hidden>
        <ul id="cart-list" class="cart-list"></ul>
        <p id="cart-empty" class="empty-state">购物袋是空的</p>
        <div class="cart-footer">
          <div class="cart-total">
            <span>合计</span>
            <strong id="cart-total">¥0.00</strong>
          </div>
          <button type="button" class="btn btn-primary" id="checkout-btn" disabled>提交订单</button>
          <p id="checkout-error" class="form-error hidden"></p>
        </div>
      </div>

      <div id="tab-orders" class="tab-panel" role="tabpanel" hidden>
        <div id="orders-list" class="orders-list"></div>
        <p id="orders-empty" class="empty-state">还没有订单</p>
        <p id="orders-error" class="error-state hidden"></p>
        <button type="button" class="btn btn-ghost" id="refresh-orders">刷新订单</button>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

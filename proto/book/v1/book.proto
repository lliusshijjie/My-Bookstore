syntax = "proto3";

package bookstore.book.v1;

import "proto/common/v1/common.proto";

option cc_enable_arenas = true;

service BookService {
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
}

enum BookStatus {
  BOOK_STATUS_UNSPECIFIED = 0;
  BOOK_STATUS_ACTIVE = 1;
  BOOK_STATUS_INACTIVE = 2;
}

message Book {
  int64 book_id = 1;
  string title = 2;
  string author = 3;
  int64 price_cents = 4;
  int32 stock = 5;
  BookStatus status = 6;
}

message ListBooksRequest {
  bookstore.common.v1.PageRequest page = 1;
  bool active_only = 2;
}

message ListBooksResponse {
  repeated Book books = 1;
  bookstore.common.v1.PageResponse page = 2;
}

message GetBookRequest {
  int64 book_id = 1;
}

message GetBookResponse {
  Book book = 1;
}

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libmysqlclient-dev \
            libgrpc++-dev \
            libprotobuf-dev \
            pkg-config \
            protobuf-compiler \
            protobuf-compiler-grpc

      - name: Configure CMake
        run: cmake -S . -B ci-build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build ci-build --parallel

      - name: Validate Protobuf contracts
        run: cmake --build ci-build --target check_proto_contracts

      - name: Run tests
        env:
          CTEST_OUTPUT_ON_FAILURE: "1"
        working-directory: ci-build
        run: ctest --output-on-failure

      - name: Validate client search assets
        run: |
          test -f client/index.html
          test -f client/js/api.js
          test -f client/js/app.js
          grep -R "/api/books/search" client/js client/index.html

      - name: Validate Makefile gRPC stub generation
        run: |
          make GRPC_OUT_DIR=/tmp/tinyweb-grpc-generated grpc-stubs
          test -f /tmp/tinyweb-grpc-generated/proto/user/v1/user.grpc.pb.cc
          test -f /tmp/tinyweb-grpc-generated/proto/book/v1/book.grpc.pb.cc
          test -f /tmp/tinyweb-grpc-generated/proto/inventory/v1/inventory.grpc.pb.cc
          test -f /tmp/tinyweb-grpc-generated/proto/order/v1/order.grpc.pb.cc

      - name: Validate Makefile server build
        run: make server

  redis-enabled-build:
    name: Redis-enabled build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            git \
            libgrpc++-dev \
            libhiredis-dev \
            libmysqlclient-dev \
            libprotobuf-dev \
            pkg-config \
            protobuf-compiler \
            protobuf-compiler-grpc \
            redis-server

      - name: Build and install redis-plus-plus
        run: |
          git clone --depth 1 https://github.com/sewenew/redis-plus-plus.git /tmp/redis-plus-plus
          cmake -S /tmp/redis-plus-plus -B /tmp/redis-plus-plus-build \
            -DREDIS_PLUS_PLUS_BUILD_TEST=OFF \
            -DREDIS_PLUS_PLUS_BUILD_STATIC=OFF \
            -DREDIS_PLUS_PLUS_CXX_STANDARD=17 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/redis-plus-plus-build --parallel
          sudo cmake --install /tmp/redis-plus-plus-build
          sudo ldconfig

      - name: Start Redis
        run: |
          redis-server --daemonize yes
          redis-cli ping

      - name: Configure CMake with Redis
        run: cmake -S . -B ci-build-redis -DBUILD_TESTS=ON -DTINYWEBSERVER_ENABLE_REDIS=ON

      - name: Build with Redis
        run: cmake --build ci-build-redis --parallel

      - name: Run Redis-enabled tests
        env:
          CTEST_OUTPUT_ON_FAILURE: "1"
          TEST_REDIS_URL: tcp://127.0.0.1:6379
        working-directory: ci-build-redis
        run: ctest --output-on-failure

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libmysqlclient-dev \
            libgrpc++-dev \
            libprotobuf-dev \
            pkg-config \
            protobuf-compiler \
            protobuf-compiler-grpc

      - name: Configure CMake
        run: cmake -S . -B ci-build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build ci-build --parallel

      - name: Validate Protobuf contracts
        run: cmake --build ci-build --target check_proto_contracts

      - name: Run tests
        env:
          CTEST_OUTPUT_ON_FAILURE: "1"
        working-directory: ci-build
        run: ctest --output-on-failure

      - name: Validate Makefile gRPC stub generation
        run: |
          make GRPC_OUT_DIR=/tmp/tinyweb-grpc-generated grpc-stubs
          test -f /tmp/tinyweb-grpc-generated/proto/user/v1/user.grpc.pb.cc
          test -f /tmp/tinyweb-grpc-generated/proto/book/v1/book.grpc.pb.cc
          test -f /tmp/tinyweb-grpc-generated/proto/inventory/v1/inventory.grpc.pb.cc
          test -f /tmp/tinyweb-grpc-generated/proto/order/v1/order.grpc.pb.cc

      - name: Validate Makefile server build
        run: make server

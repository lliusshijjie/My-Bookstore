apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: tinywebserver
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
---

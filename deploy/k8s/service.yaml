apiVersion: v1
kind: Service
metadata:
  name: tinywebserver-service
  namespace: tinywebserver
  labels:
    app: tinywebserver
spec:
  type: NodePort
  selector:
    app: tinywebserver
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 9006
      nodePort: 30080

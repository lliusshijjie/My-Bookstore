apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tinywebserver
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: tinywebserver
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: tinywebserver:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/inventory_grpc_server"]
          args: ["0.0.0.0:50051"]
          ports:
            - containerPort: 50051
              name: grpc
          env:
            - name: INVENTORY_DB_HOST
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: MYSQL_HOST}}
            - name: INVENTORY_DB_PORT
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: MYSQL_PORT}}
            - name: INVENTORY_DB_NAME
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: MYSQL_DATABASE}}
            - name: INVENTORY_DB_USER
              valueFrom: {secretKeyRef: {name: mysql-secret, key: MYSQL_USER}}
            - name: INVENTORY_DB_PASSWORD
              valueFrom: {secretKeyRef: {name: mysql-secret, key: MYSQL_PASSWORD}}
            - name: INVENTORY_DB_POOL_SIZE
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: SQL_POOL_SIZE}}
          livenessProbe:
            tcpSocket: {port: 50051}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket: {port: 50051}
            initialDelaySeconds: 3
            periodSeconds: 5
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinywebserver
  namespace: tinywebserver
  labels:
    app: tinywebserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tinywebserver
  template:
    metadata:
      labels:
        app: tinywebserver
    spec:
      containers:
        - name: server
          image: tinywebserver:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9006
              name: http
          args:
            - "-p"
            - "9006"
            - "-l"
            - "$(LOG_MODE)"
            - "-m"
            - "$(TRIG_MODE)"
            - "-t"
            - "$(THREAD_NUM)"
            - "-s"
            - "$(SQL_POOL_SIZE)"
          env:
            - name: LOG_MODE
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: LOG_MODE}}
            - name: TRIG_MODE
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: TRIG_MODE}}
            - name: THREAD_NUM
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: THREAD_NUM}}
            - name: SQL_POOL_SIZE
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: SQL_POOL_SIZE}}
            - name: MYSQL_HOST
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: MYSQL_HOST}}
            - name: MYSQL_PORT
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: MYSQL_PORT}}
            - name: MYSQL_DATABASE
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: MYSQL_DATABASE}}
            - name: MYSQL_USER
              valueFrom: {secretKeyRef: {name: mysql-secret, key: MYSQL_USER}}
            - name: MYSQL_PASSWORD
              valueFrom: {secretKeyRef: {name: mysql-secret, key: MYSQL_PASSWORD}}
            - name: REDIS_URL
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: REDIS_URL}}
            - name: USER_GRPC_TARGET
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: USER_GRPC_TARGET}}
            - name: BOOK_GRPC_TARGET
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: BOOK_GRPC_TARGET}}
            - name: INVENTORY_GRPC_TARGET
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: INVENTORY_GRPC_TARGET}}
            - name: ORDER_GRPC_TARGET
              valueFrom: {configMapKeyRef: {name: tinywebserver-config, key: ORDER_GRPC_TARGET}}
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/live
              port: 9006
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 9006
            initialDelaySeconds: 10
            periodSeconds: 5

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: tinywebserver-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qgydb}
      MYSQL_USER: ${MYSQL_USER:-tinyuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tinywebserver-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    image: tinywebserver-app:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: tinywebserver-inventory
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      INVENTORY_DB_HOST: mysql
      INVENTORY_DB_PORT: 3306
      INVENTORY_DB_USER: ${MYSQL_USER:-tinyuser}
      INVENTORY_DB_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
      INVENTORY_DB_NAME: ${MYSQL_DATABASE:-qgydb}
      INVENTORY_DB_POOL_SIZE: 8
    entrypoint: ["/app/inventory_grpc_server"]
    command: ["0.0.0.0:50051"]
    ports:
      - "${INVENTORY_GRPC_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/50051'"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: tinywebserver-app:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: tinywebserver
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-tinyuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qgydb}
      REDIS_URL: "tcp://redis:6379"
      INVENTORY_GRPC_TARGET: inventory-service:50051
      ORDER_GRPC_TARGET: order-service:50052
      USER_GRPC_TARGET: user-service:50053
      BOOK_GRPC_TARGET: book-service:50054
    # 仅内网暴露，由 nginx 反代到 https
    expose:
      - "9006"
    command:
      - "-p"
      - "9006"
      - "-l"
      - "1"
      - "-m"
      - "3"
      - "-t"
      - "8"
      - "-s"
      - "8"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9006/api/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 对外 https 入口；内部回源 http://server:9006
  # 启动前先生成证书: bash deploy/docker/nginx/generate-cert.sh
  nginx:
    image: nginx:1.27-alpine
    container_name: tinywebserver-nginx
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5


  order-service:
    image: tinywebserver-app:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: tinywebserver-order
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    environment:
      ORDER_DB_HOST: mysql
      ORDER_DB_PORT: 3306
      ORDER_DB_USER: ${MYSQL_USER:-tinyuser}
      ORDER_DB_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
      ORDER_DB_NAME: ${MYSQL_DATABASE:-qgydb}
      ORDER_DB_POOL_SIZE: 8
      INVENTORY_GRPC_TARGET: inventory-service:50051
      BOOK_GRPC_TARGET: book-service:50054
    entrypoint: ["/app/order_grpc_server"]
    command: ["0.0.0.0:50052"]
    ports:
      - "${ORDER_GRPC_PORT:-50052}:50052"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/50052'"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    image: tinywebserver-app:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: tinywebserver-user
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      USER_DB_HOST: mysql
      USER_DB_PORT: 3306
      USER_DB_USER: ${MYSQL_USER:-tinyuser}
      USER_DB_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
      USER_DB_NAME: ${MYSQL_DATABASE:-qgydb}
      USER_DB_POOL_SIZE: 8
    entrypoint: ["/app/user_grpc_server"]
    command: ["0.0.0.0:50053"]
    ports:
      - "${USER_GRPC_PORT:-50053}:50053"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/50053'"]
      interval: 10s
      timeout: 5s
      retries: 5

  book-service:
    image: tinywebserver-app:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: tinywebserver-book
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      BOOK_DB_HOST: mysql
      BOOK_DB_PORT: 3306
      BOOK_DB_USER: ${MYSQL_USER:-tinyuser}
      BOOK_DB_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
      BOOK_DB_NAME: ${MYSQL_DATABASE:-qgydb}
      BOOK_DB_POOL_SIZE: 8
    entrypoint: ["/app/book_grpc_server"]
    command: ["0.0.0.0:50054"]
    ports:
      - "${BOOK_GRPC_PORT:-50054}:50054"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/50054'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:

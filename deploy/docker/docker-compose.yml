version: "3.9"

# ============================================================
#  TinyWebServer + MySQL 本地开发/测试环境
#  启动: docker compose -f deploy/docker/docker-compose.yml up --build
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: tinywebserver-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qgydb}
      MYSQL_USER: ${MYSQL_USER:-tinyuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tinypass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: tinywebserver
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 这些环境变量目前通过命令行参数注入（见 CMD）
      # 未来可改造 main.cpp 读取环境变量实现无感配置
      MYSQL_HOST: mysql
    ports:
      - "${SERVER_PORT:-9006}:9006"
    command:
      - "-p"
      - "9006"
      - "-l"
      - "1"
      - "-m"
      - "3"
      - "-t"
      - "8"
      - "-s"
      - "8"

volumes:
  mysql_data:

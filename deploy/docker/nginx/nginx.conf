# TinyWebServer — nginx TLS 反向代理
# 对外 443 (https) / 80 (http→301 https)，内部回源 http://server:9006

upstream tinywebserver_backend {
    server server:9006;
    keepalive 16;
}

# http -> https 跳转
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# https 主入口
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # 证书由 deploy/docker/nginx/generate-cert.sh 生成或替换为正式证书
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 上游是 http，告诉后端真实协议（后端目前不读，留作将来日志/重定向用）
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # /api/* 与静态文件全部回源到 gateway
    location / {
        proxy_pass http://tinywebserver_backend;
    }
}
